name: Type Check

on:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:    
      - uses: actions/checkout@v2
     
      - uses: actions/cache@v4
        with:
          path: ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
     
      - name: Install dependencies
        run: yarn

      - name: Run tests
        run: yarn type:check
